name: Build ksud

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - name: Generate version
        id: ver
        run: |
          VERSION=$(git describe --tags --always --dirty)
          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build ksud
        working-directory: ksu/userspace/daemon
        run: |
          go mod tidy
          go build \
            -ldflags "-X github.com/tiann/KernelSU/ksu/userspace/daemon.VERSION=${VERSION}" \
            -o ksud .

      - name: Upload ksud artifact
        uses: actions/upload-artifact@v4
        with:
          name: ksud
          path: ksu/userspace/daemon/ksud