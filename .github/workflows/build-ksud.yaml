name: Multi-arch ksud build

on:
  workflow_dispatch:
    inputs:
      pack_lkm:
        description: 'Pack LKM .ko files'
        required: false
        default: 'false'
      targets:
        description: 'Comma-separated Rust target triples (optional, default all)'
        required: false
        default: 'aarch64-unknown-linux-gnu,armv7-unknown-linux-gnueabihf,x86_64-unknown-linux-gnu'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [ ${{ fromJson('["aarch64-unknown-linux-gnu","armv7-unknown-linux-gnueabihf","x86_64-unknown-linux-gnu"]') }} ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        submodules: true

    - name: Add upstream remote
      run: |
        git remote add upstream https://github.com/tiann/KernelSU.git || echo "Upstream exists"

    - name: Fetch upstream tags and commits
      run: |
        git fetch upstream --tags --prune --force
        git fetch upstream main --prune --force

    - name: Detect latest upstream tag
      id: version
      run: |
        LATEST_TAG=$(git ls-remote --tags upstream | grep -E 'refs/tags/v[0-9]' | awk -F/ '{print $3}' | sort -V | tail -n1)
        echo "Latest upstream tag: $LATEST_TAG"
        echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

    - name: Checkout latest upstream tag
      run: |
        git checkout tags/${{ steps.version.outputs.tag }} -b build-${{ steps.version.outputs.tag }}

    - name: Show git describe version
      id: describe
      run: |
        VER=$(git describe --tags --always --dirty)
        echo "Version = $VER"
        echo "ver=$VER" >> $GITHUB_OUTPUT

    - name: Download LKM artifacts
      if: ${{ github.event.inputs.pack_lkm == 'true' }}
      uses: actions/download-artifact@v6

    - name: Prepare LKM files
      if: ${{ github.event.inputs.pack_lkm == 'true' }}
      run: |
        mkdir -p userspace/ksud/bin/${{ matrix.target }}
        shopt -s nullglob
        files=(android*-lkm/*_kernelsu.ko)
        if [ ${#files[@]} -eq 0 ]; then
          echo "::error::No *_kernelsu.ko found"
          exit 1
        fi
        cp "${files[@]}" userspace/ksud/bin/${{ matrix.target }}/

    - name: Setup Rust
      run: |
        rustup update stable
        rustup target add ${{ matrix.target }}

    - name: Install cross
      run: |
        cargo install cross --git https://github.com/cross-rs/cross --rev 66845c1 || true

    - name: Build ksud
      run: |
        echo "Building ksud for ${{ matrix.target }}..."
        cross build \
          --target ${{ matrix.target }} \
          --release \
          --manifest-path userspace/ksud/Cargo.toml
        echo "Build finished. Version:"
        git describe --tags --always

    - name: Upload ksud artifact
      uses: actions/upload-artifact@v5
      with:
        name: ksud-${{ matrix.target }}-${{ steps.describe.outputs.ver }}
        path: userspace/ksud/target/**/release/ksud*