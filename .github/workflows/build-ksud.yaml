name: Auto-build ksud (latest tag)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Rust target triple'
        required: true
        default: 'aarch64-unknown-linux-gnu'
      pack_lkm:
        description: 'whether to pack LKM (true/false)'
        required: false
        default: 'false'
      use_cache:
        description: 'whether to use cache (true/false)'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo (full history)
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Fetch all tags
      run: |
        git fetch --tags --force
        echo "All tags:"
        git tag -l

    - name: Detect latest version tag
      id: version
      run: |
        LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)
        echo "Latest tag: $LATEST_TAG"
        if [ -z "$LATEST_TAG" ]; then
          echo "::error::No version tag found!"
          exit 1
        fi
        echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

    - name: Checkout latest tag
      run: |
        echo "Checking out tag: ${{ steps.version.outputs.tag }}"
        git checkout ${{ steps.version.outputs.tag }}

    - name: Show version info
      run: |
        echo "Describe version:"
        git describe --tags --always

    - name: Download LKM artifacts
      if: ${{ github.event.inputs.pack_lkm == 'true' }}
      uses: actions/download-artifact@v6

    - name: Prepare LKM files (optional)
      if: ${{ github.event.inputs.pack_lkm == 'true' }}
      run: |
        mkdir -p userspace/ksud/bin/aarch64/
        shopt -s nullglob || true
        files=(android*-lkm/*_kernelsu.ko)
        if [ ${#files[@]} -eq 0 ]; then
          echo "::error::No *_kernelsu.ko found."
          exit 1
        fi
        cp "${files[@]}" userspace/ksud/bin/aarch64/
        ls -la userspace/ksud/bin/aarch64/

    - name: Setup Rust
      run: |
        rustup update stable

    - name: Add Rust target
      run: |
        rustup target add ${{ github.event.inputs.target }}

    - name: Install cross
      run: |
        cargo install cross --git https://github.com/cross-rs/cross --rev 66845c1 || true

    - name: Build ksud
      run: |
        echo "Building ksud..."
        cross build --target ${{ github.event.inputs.target }} --release --manifest-path ./userspace/ksud/Cargo.toml
        echo "Build result version:"
        git describe --tags --always

    - name: Upload ksud artifact
      uses: actions/upload-artifact@v5
      with:
        name: ksud-${{ github.event.inputs.target }}-${{ steps.version.outputs.tag }}
        path: userspace/ksud/target/**/release/ksud*