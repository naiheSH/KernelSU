name: Build ksud

on:
  push:
    branches: [ main ]
    tags:
      - '*'   # 当你给上游 tag（如 3.0.0）同步后自动构建
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # 必须，否则 git describe 无法获得 tag
          submodules: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 获取 ksud 版本号（核心步骤）
      - name: Generate version
        id: ver
        run: |
          VERSION=$(git describe --tags --always --dirty)
          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build ksud
        run: |
          cd userspace
          go build -ldflags "-X github.com/tiann/KernelSU/userspace/daemon.VERSION=${VERSION}" -o ksud .

      - name: Upload ksud
        uses: actions/upload-artifact@v4
        with:
          name: ksud
          path: userspace/ksud